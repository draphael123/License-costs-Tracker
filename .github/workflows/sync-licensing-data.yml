name: Sync Licensing Data

on:
  schedule:
    # Run every Sunday at 6 AM UTC (1 AM EST)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update licensing data
        id: sync
        run: |
          node scripts/sync-data.cjs
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/providerLicensing.ts; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync licensing data from Google Sheets'
          title: '[Auto] Weekly Licensing Data Sync'
          body: |
            ## Automated Data Sync

            This PR was automatically generated by the weekly sync workflow.

            **Changes:**
            - Updated provider licensing data from Google Sheets
            - Sync timestamp added to audit log

            Please review the changes before merging.
          branch: auto-sync-licensing-data
          delete-branch: true
          labels: |
            automated
            data-sync
